stages:
  - build
  - update-manifests

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE

build-and-push:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf '%s:%s' "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --destination "${IMAGE_NAME}:latest"
      --cache=true
      --single-snapshot
      --compressed-caching=false
  only:
    - main

update-manifests:
  stage: update-manifests
  image: alpine:3.19
  variables:
    GIT_STRATEGY: clone
    FULL_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - apk add --no-cache sed git
  script:
    - echo "Updating manifests to $FULL_IMAGE"
    - sed -i "s|image:.*|image:\ $FULL_IMAGE|" k8s/deployment.yaml
    - grep "image:" k8s/deployment.yaml
    - git config user.email "ci@cocreate.io"
    - git config user.name "GitLab CI"
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@gitlab.colate.io/${CI_PROJECT_PATH}.git"
    - git add k8s/deployment.yaml
    - git diff --cached --quiet || git commit -m "ci update image to ${CI_COMMIT_SHORT_SHA}"
    - git push -o ci.skip origin HEAD:main
  only:
    - main
